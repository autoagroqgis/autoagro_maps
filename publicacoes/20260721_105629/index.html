<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publicar Maps 21/07/2026 10:56</title>
  <style>
    html, body, #map { height: 100%; margin: 0; }
    body { font-family: Arial, sans-serif; background: #111; }
    .topbar {
      position: absolute; z-index: 5; left: 16px; top: 16px;
      background: rgba(255,255,255,.94); border-radius: 4px; padding: 8px 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.22); font-size: 13px;
    }
    .topbar a { color: #1769aa; text-decoration: none; font-weight: 700; margin-left: 8px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    Publicar Maps 21/07/2026 10:56
    <a id="googleMapsLink" target="_blank" rel="noopener">Google Maps</a>
    <a id="earthLink" target="_blank" rel="noopener">Google Earth</a>
    <a href="mapa.kmz">KMZ</a>
    <a href="mapa.kml">KML</a>
  </div>
  <script>
    async function initMap() {
      const center = { lat: -23.32857840, lng: -51.92644251 };
      const map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 17,
        mapTypeId: "satellite",
        mapTypeControl: true,
        streetViewControl: false,
        fullscreenControl: true
      });

      document.getElementById("googleMapsLink").href =
        `https://www.google.com/maps/@${center.lat},${center.lng},18z/data=!3m1!1e3`;
      document.getElementById("earthLink").href =
        `https://earth.google.com/web/@${center.lat},${center.lng},700a,1000d,35y,0h,0t,0r`;

      const response = await fetch("dados.geojson", { cache: "no-store" });
      const data = await response.json();
      map.data.addGeoJson(data);
      const bounds = new google.maps.LatLngBounds();
      map.data.forEach(feature => {
        const geometry = feature.getGeometry();
        if (geometry && geometry.forEachLatLng) {
          geometry.forEachLatLng(latlng => bounds.extend(latlng));
        }
      });
      map.data.setStyle(feature => {
        const color = feature.getProperty("color") || "#d81b60";
        const geometryType = feature.getProperty("geometry_type") || "";
        return {
          strokeColor: color,
          strokeWeight: geometryType === "line" ? 3 : 2,
          strokeOpacity: 1,
          fillColor: color,
          fillOpacity: 0.22,
          clickable: true,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 6,
            fillColor: color,
            fillOpacity: 0.9,
            strokeColor: "#ffffff",
            strokeWeight: 1
          }
        };
      });
      const info = new google.maps.InfoWindow();
      map.data.addListener("click", event => {
        const name = event.feature.getProperty("name") || "Objeto";
        const layer = event.feature.getProperty("layer") || "";
        info.setContent(`<strong>${name}</strong><br>${layer}`);
        info.setPosition(event.latLng);
        info.open(map);
      });
      if (!bounds.isEmpty()) {
        map.fitBounds(bounds, 48);
      }
      new google.maps.Marker({ position: center, map: map });
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDvkfG_HxJr6N0cdtWdKFY4LSFLpSRncD4&callback=initMap&v=weekly"></script>
</body>
</html>
